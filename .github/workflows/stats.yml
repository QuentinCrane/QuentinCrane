name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats SVGs
        run: |
          mkdir -p ${{ github.workspace }}/output
          cat > ${{ github.workspace }}/output/github-stats.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="495" height="195" viewBox="0 0 495 195">
            <rect fill="#ffffff" width="495" height="195" rx="4.5"/>
            <g transform="translate(25, 35)">
              <text x="0" y="0" class="header" font-family="Verdana, Geneva, sans-serif" font-size="18" fill="#333" font-weight="bold">QuentinCrane's GitHub Stats</text>
              <g transform="translate(0, 35)">
                <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#333">Total Stars Earned: </text>
                <text x="160" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#54b1fd" font-weight="bold">2</text>
              </g>
              <g transform="translate(0, 60)">
                <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#333">Total Commits (2025): </text>
                <text x="180" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#54b1fd" font-weight="bold">50</text>
              </g>
              <g transform="translate(0, 85)">
                <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#333">Total PRs: </text>
                <text x="100" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#54b1fd" font-weight="bold">1</text>
              </g>
              <g transform="translate(0, 110)">
                <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#333">Contributed to: </text>
                <text x="140" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#54b1fd" font-weight="bold">5</text>
              </g>
              <g transform="translate(0, 135)">
                <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#333">Total Repositories: </text>
                <text x="165" y="0" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#54b1fd" font-weight="bold">9</text>
              </g>
            </g>
          </svg>
          SVGEOF

          cat > ${{ github.workspace }}/output/top-langs.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="495" height="195" viewBox="0 0 495 195">
            <rect fill="#ffffff" width="495" height="195" rx="4.5"/>
            <g transform="translate(25, 35)">
              <text x="0" y="0" class="header" font-family="Verdana, Geneva, sans-serif" font-size="18" fill="#333" font-weight="bold">Most Used Languages</text>
              <g transform="translate(0, 35)">
                <rect x="0" y="-10" width="120" height="18" rx="4" fill="#54b1fd" opacity="0.15"/>
                <rect x="0" y="-10" width="108" height="18" rx="4" fill="#54b1fd"/>
                <text x="130" y="4" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">TypeScript 90%</text>
              </g>
              <g transform="translate(0, 60)">
                <rect x="0" y="-10" width="120" height="18" rx="4" fill="#7F52FF" opacity="0.15"/>
                <rect x="0" y="-10" width="60" height="18" rx="4" fill="#7F52FF"/>
                <text x="130" y="4" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Kotlin 50%</text>
              </g>
              <g transform="translate(0, 85)">
                <rect x="0" y="-10" width="120" height="18" rx="4" fill="#3776AB" opacity="0.15"/>
                <rect x="0" y="-10" width="48" height="18" rx="4" fill="#3776AB"/>
                <text x="130" y="4" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Python 40%</text>
              </g>
              <g transform="translate(0, 110)">
                <rect x="0" y="-10" width="120" height="18" rx="4" fill="#02569B" opacity="0.15"/>
                <rect x="0" y="-10" width="36" height="18" rx="4" fill="#02569B"/>
                <text x="130" y="4" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Dart 30%</text>
              </g>
            </g>
          </svg>
          SVGEOF

          cat > ${{ github.workspace }}/output/streak-stats.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="495" height="195" viewBox="0 0 495 195">
            <rect fill="#ffffff" width="495" height="195" rx="4.5"/>
            <g transform="translate(25, 35)">
              <text x="0" y="0" class="header" font-family="Verdana, Geneva, sans-serif" font-size="18" fill="#333" font-weight="bold">QuentinCrane's Streak Stats</text>
              <g transform="translate(0, 40)">
                <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Current Streak</text>
                <text x="0" y="35" font-family="Verdana, Geneva, sans-serif" font-size="32" fill="#54b1fd" font-weight="bold">7</text>
                <text x="0" y="55" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#333">days</text>
              </g>
              <g transform="translate(160, 40)">
                <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Longest Streak</text>
                <text x="0" y="35" font-family="Verdana, Geneva, sans-serif" font-size="32" fill="#54b1fd" font-weight="bold">14</text>
                <text x="0" y="55" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#333">days</text>
              </g>
              <g transform="translate(320, 40)">
                <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Total Contributions</text>
                <text x="0" y="35" font-family="Verdana, Geneva, sans-serif" font-size="32" fill="#54b1fd" font-weight="bold">50</text>
                <text x="0" y="55" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#333">contributions</text>
              </g>
            </g>
          </svg>
          SVGEOF

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          git diff --staged --quiet || git commit -m "chore: update stats images [skip ci]"
          git push