<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="495" height="195" viewBox="0 0 495 195">
  <rect fill="#ffffff" width="495" height="195" rx="4.5"/>
  <g transform="translate(25, 35)">
    <text x="0" y="0" class="header" font-family="Verdana, Geneva, sans-serif" font-size="18" fill="#333" font-weight="bold">QuentinCrane's Streak Stats</text>
    <g transform="translate(0, 40)">
      <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Current Streak</text>
      <text x="0" y="35" font-family="Verdana, Geneva, sans-serif" font-size="32" fill="#54b1fd" font-weight="bold">7</text>
      <text x="0" y="55" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#333">days</text>
    </g>
    <g transform="translate(160, 40)">
      <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Longest Streak</text>
      <text x="0" y="35" font-family="Verdana, Geneva, sans-serif" font-size="32" fill="#54b1fd" font-weight="bold">14</text>
      <text x="0" y="55" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#333">days</text>
    </g>
    <g transform="translate(320, 40)">
      <text x="0" y="0" font-family="Verdana, Geneva, sans-serif" font-size="13" fill="#333">Total Contributions</text>
      <text x="0" y="35" font-family="Verdana, Geneva, sans-serif" font-size="32" fill="#54b1fd" font-weight="bold">50</text>
      <text x="0" y="55" font-family="Verdana, Geneva, sans-serif" font-size="12" fill="#333">contributions</text>
    </g>
  </g>
</svg>
